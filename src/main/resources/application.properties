spring.application.name=fault-tolerant-payment-ledger
server.port=${SERVER_PORT:8081}
spring.datasource.url=jdbc:h2:mem:ledger;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
info.app.name=${spring.application.name}
info.app.description=Reference implementation for atomic and idempotent money transfers
ledger.seed-demo-data=true
