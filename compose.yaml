services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ledger-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/ledger
      DB_USERNAME: ledger
      DB_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
      LEDGER_SEED_DEMO_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  ledger-data:
