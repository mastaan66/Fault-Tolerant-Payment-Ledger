name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; follow SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest commands, request, or test that reproduces it.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision
      description: Commit SHA or release version.
    validations:
      required: true
  - type: input
    id: java
    attributes:
      label: Java version
      placeholder: "21.0.x"
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - H2
        - PostgreSQL
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets and personal or payment data.
      render: text
